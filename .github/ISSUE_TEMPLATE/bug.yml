name: Bug report
description: Report reproducible behavior that differs from Soul's documented contract.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping make durable AI memory more trustworthy. Remove secrets and private memory content before posting.
  - type: input
    id: version
    attributes:
      label: Soul version
      description: Run `npx soul-mcp --version`.
      placeholder: 4.0.1
    validations:
      required: true
  - type: input
    id: client
    attributes:
      label: MCP client and OS
      placeholder: Claude Code on macOS 15
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include commands or sanitized MCP calls. Never paste your database or secrets.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and sanitized logs
    validations:
      required: true
  - type: checkboxes
    id: doctor
    attributes:
      label: Health check
      options:
        - label: I ran `npx soul-mcp doctor` and removed private paths/content from the output.
          required: true
